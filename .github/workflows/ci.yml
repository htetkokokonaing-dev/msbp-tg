name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt && python -m pip install -e .
      - name: Run test suite
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: python -m pytest -q -p no:cacheprovider
      - name: Public release safety check
        run: python scripts/check_public_release_safety.py
      - name: Public-safe data-rights check
        run: python scripts/check_public_safe_repo.py
